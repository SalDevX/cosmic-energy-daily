<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Energy Daily — Your Daily Horoscope</title>
<meta name="description" content="Daily horoscope readings for all 12 zodiac signs. Mystical, cinematic, and grounded in celestial truth.">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold-dim:#8A6F2E;--gold-glow:rgba(201,168,76,0.12);
  --deep:#04060F;--deep2:#080C1A;--surface:rgba(255,255,255,0.03);
  --border:rgba(201,168,76,0.18);--text:#E8E0CC;--text-dim:rgba(232,224,204,0.5);
}
body{background:var(--deep);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden}
canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 2rem}
header{text-align:center;padding:3rem 0 1.5rem;border-bottom:1px solid var(--border)}
.logo-sol{width:52px;height:52px;margin:0 auto 1.1rem;display:block}
h1{font-family:'Cinzel',serif;font-size:clamp(1.3rem,4vw,2.1rem);font-weight:700;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase}
.tagline{font-size:.95rem;font-style:italic;color:var(--text-dim);margin-top:.4rem;letter-spacing:.05em}
.date-bar{text-align:center;padding:1rem 0;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.25em;color:var(--text-dim);text-transform:uppercase;border-bottom:1px solid var(--border)}
.wheel-section{padding:2.5rem 0 1.5rem;text-align:center}
.wheel-title{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:1.5rem}
.wheel-outer{width:100%;display:flex;justify-content:center;align-items:center;overflow:hidden}
.zodiac-wheel{position:relative;width:480px;height:480px;flex-shrink:0;transform-origin:center center}
.sign-node{position:absolute;width:62px;height:62px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .3s,background .3s,box-shadow .3s;transform:translate(-50%,-50%)}
.sign-node:hover,.sign-node.active{border-color:var(--gold);background:var(--gold-glow);box-shadow:0 0 18px var(--gold-glow)}
.sign-node.active .sign-symbol,.sign-node.active .sign-label{color:var(--gold)}
.sign-symbol{font-size:1.3rem;line-height:1}
.sign-label{font-family:'Cinzel',serif;font-size:.4rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-top:2px}
.video-section{padding:1.5rem 0 3.5rem}
.video-header{display:flex;align-items:center;gap:1.2rem;margin-bottom:1.8rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
.video-sign-symbol-large{font-size:2.8rem;color:var(--gold);line-height:1}
.video-sign-info h2{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
.video-sign-info p{font-style:italic;color:var(--text-dim);font-size:.9rem;margin-top:.2rem}
.video-embed-wrap{display:flex;gap:2.5rem;align-items:flex-start}
.video-frame{flex-shrink:0;width:315px;height:560px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--deep2)}
.video-frame iframe{width:100%;height:100%;border:none;display:block}
.video-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:var(--text-dim)}
.video-placeholder .ph-symbol{font-size:3.5rem;color:var(--gold-dim)}
.sign-details{flex:1;padding-top:.5rem}
.detail-row{display:flex;margin-bottom:1.5rem}
.detail-card{flex:1;padding:.9rem 1rem;border:1px solid var(--border);border-right:none;background:var(--surface)}
.detail-card:last-child{border-right:1px solid var(--border);border-radius:0 4px 4px 0}
.detail-card:first-child{border-radius:4px 0 0 4px}
.detail-label{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.3rem}
.detail-value{font-size:1rem;color:var(--gold)}
.sign-description{font-size:1rem;line-height:1.85;color:var(--text-dim);font-style:italic;border-left:2px solid var(--gold-dim);padding-left:1.2rem;margin-bottom:1.5rem}
.yt-link{display:inline-flex;align-items:center;gap:.5rem;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid var(--gold-dim);padding:.6rem 1.2rem;border-radius:2px;transition:all .2s}
.yt-link:hover{background:var(--gold-glow);border-color:var(--gold)}
footer{text-align:center;padding:2rem 0;border-top:1px solid var(--border);font-size:.75rem;color:var(--text-dim);font-style:italic;letter-spacing:.05em}
@media(max-width:700px){
  .video-embed-wrap{flex-direction:column}
  .video-frame{width:100%;height:500px}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="wrap">
  <header>
    <svg class="logo-sol" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="sg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#6B7FD4" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.6"/>
        </radialGradient>
      </defs>
      <g fill="none" stroke="url(#sg)" stroke-width="0.8" opacity="0.9">
        <circle cx="26" cy="26" r="8"/>
        <circle cx="26" cy="18" r="8"/>
        <circle cx="26" cy="34" r="8"/>
        <circle cx="33" cy="22" r="8"/>
        <circle cx="33" cy="30" r="8"/>
        <circle cx="19" cy="22" r="8"/>
        <circle cx="19" cy="30" r="8"/>
        <circle cx="26" cy="26" r="16" stroke-opacity="0.3"/>
      </g>
    </svg>
    <h1>Cosmic Energy Daily</h1>
    <p class="tagline">Ancient wisdom. Celestial precision. Daily guidance.</p>
  </header>

  <div class="date-bar" id="date-bar">—</div>

  <section class="wheel-section">
    <p class="wheel-title">Select your sign</p>
    <div class="wheel-outer">
    <div class="zodiac-wheel" id="wheel">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:480px;height:480px;border-radius:50%;border:1px solid var(--border)"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;height:340px;border-radius:50%;border:1px dashed rgba(201,168,76,0.15)"></div>

      <svg id="sol-svg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:190px;height:190px;overflow:visible" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="solg1" cx="50%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#5B7FE8" stop-opacity="0.7"/>
            <stop offset="60%" stop-color="#8B4DB8" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#D4234A" stop-opacity="0.3"/>
          </radialGradient>
          <radialGradient id="solg2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#4A6FD4" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#D4234A" stop-opacity="0.04"/>
          </radialGradient>
          <clipPath id="solclip">
            <circle cx="100" cy="100" r="94"/>
          </clipPath>
        </defs>
        <circle cx="100" cy="100" r="92" fill="none" stroke="rgba(201,168,76,0.12)" stroke-width="0.5"/>
        <circle cx="100" cy="100" r="90" fill="url(#solg2)"/>
        <g clip-path="url(#solclip)" fill="none" stroke="url(#solg1)" stroke-width="0.9">
          <circle cx="100" cy="100" r="34"/>
          <circle cx="100" cy="66"  r="34"/>
          <circle cx="129.4" cy="83"  r="34"/>
          <circle cx="129.4" cy="117" r="34"/>
          <circle cx="100" cy="134" r="34"/>
          <circle cx="70.6" cy="117" r="34"/>
          <circle cx="70.6" cy="83"  r="34"/>
          <circle cx="100" cy="100" r="68" stroke-opacity="0.2"/>
        </g>
        <circle cx="100" cy="100" r="3" fill="#C9A84C" opacity="0.8"/>
      </svg>
    </div>
    </div><!-- end wheel-outer -->
  </section>

  <section class="video-section" id="video-section">
    <div class="video-header" id="video-header" style="display:none">
      <div class="video-sign-symbol-large" id="vs-symbol"></div>
      <div class="video-sign-info">
        <h2 id="vs-name"></h2>
        <p id="vs-dates"></p>
      </div>
    </div>
    <div class="video-embed-wrap">
      <div class="video-frame" id="video-frame">
        <div class="video-placeholder">
          <div class="ph-symbol">☽</div>
          <p style="font-size:.9rem;text-align:center;line-height:1.6">Select a sign above<br>to reveal today's reading</p>
        </div>
      </div>
      <div class="sign-details" id="sign-details" style="display:none">
        <div class="detail-row" id="detail-row"></div>
        <p class="sign-description" id="sign-desc"></p>
        <a class="yt-link" href="https://youtube.com/@CosmicEnergyDaily" target="_blank">▶ Watch on YouTube</a>
      </div>
    </div>
  </section>

  <footer>© 2026 Cosmic Energy Daily &nbsp;·&nbsp; Guided by the stars, grounded in truth</footer>
</div>

<script>
const signs=[
  {name:'Aries',      symbol:'♈',dates:'Mar 21–Apr 19',element:'Fire', ruler:'Mars',   trait:'Bold & Pioneering',    desc:'The ram charges forward with fearless instinct. Cardinal fire ignites new cycles and refuses stagnation.'},
  {name:'Taurus',     symbol:'♉',dates:'Apr 20–May 20',element:'Earth',ruler:'Venus',  trait:'Steady & Sensual',     desc:'The bull moves deliberately, grounded in beauty and material truth. Fixed earth holds what others let slip.'},
  {name:'Gemini',     symbol:'♊',dates:'May 21–Jun 20',element:'Air',  ruler:'Mercury',trait:'Quick & Curious',      desc:'The twins see every angle simultaneously. Mutable air connects minds, ideas, and possibilities.'},
  {name:'Cancer',     symbol:'♋',dates:'Jun 21–Jul 22',element:'Water',ruler:'Moon',   trait:'Deep & Nurturing',     desc:'The crab carries its home within. Cardinal water flows inward, protecting what matters most.'},
  {name:'Leo',        symbol:'♌',dates:'Jul 23–Aug 22',element:'Fire', ruler:'Sun',    trait:'Radiant & Proud',      desc:'The lion commands through presence. Fixed fire burns without apology, illuminating all it touches.'},
  {name:'Virgo',      symbol:'♍',dates:'Aug 23–Sep 22',element:'Earth',ruler:'Mercury',trait:'Precise & Devoted',    desc:'The maiden refines until perfection is reached. Mutable earth transforms chaos into elegant order.'},
  {name:'Libra',      symbol:'♎',dates:'Sep 23–Oct 22',element:'Air',  ruler:'Venus',  trait:'Balanced & Just',      desc:'The scales weigh every truth with fairness. Cardinal air seeks harmony between opposites.'},
  {name:'Scorpio',    symbol:'♏',dates:'Oct 23–Nov 21',element:'Water',ruler:'Pluto',  trait:'Intense & Perceptive', desc:'The scorpion sees what others hide. Fixed water runs deep, transforming through descent.'},
  {name:'Sagittarius',symbol:'♐',dates:'Nov 22–Dec 21',element:'Fire', ruler:'Jupiter',trait:'Free & Visionary',     desc:'The archer aims beyond the horizon. Mutable fire seeks meaning across vast distances.'},
  {name:'Capricorn',  symbol:'♑',dates:'Dec 22–Jan 19',element:'Earth',ruler:'Saturn', trait:'Disciplined & Driven', desc:'The sea-goat climbs without pause. Cardinal earth builds legacies that outlast generations.'},
  {name:'Aquarius',   symbol:'♒',dates:'Jan 20–Feb 18',element:'Air',  ruler:'Uranus', trait:'Original & Visionary', desc:'The water-bearer pours knowledge for all. Fixed air disrupts convention in service of collective truth.'},
  {name:'Pisces',     symbol:'♓',dates:'Feb 19–Mar 20',element:'Water',ruler:'Neptune',trait:'Fluid & Empathic',     desc:'The fish swims between worlds. Mutable water dissolves boundaries, merging with the infinite.'},
];

// ── UPDATE THESE DAILY with your YouTube video IDs ──
const ytIds={
  Aries:'',Taurus:'',Gemini:'',Cancer:'',Leo:'',Virgo:'',
  Libra:'',Scorpio:'',Sagittarius:'',Capricorn:'',Aquarius:'',Pisces:''
};

function buildWheel(){
  const wheel=document.getElementById('wheel');
  const cx=240,cy=240,r=205;
  signs.forEach((s,i)=>{
    const angle=(i/12)*Math.PI*2-Math.PI/2;
    const x=cx+r*Math.cos(angle);
    const y=cy+r*Math.sin(angle);
    const node=document.createElement('div');
    node.className='sign-node';
    node.style.left=x+'px';
    node.style.top=y+'px';
    node.innerHTML=`<span class="sign-symbol">${s.symbol}</span><span class="sign-label">${s.name}</span>`;
    node.addEventListener('click',()=>selectSign(i,node));
    wheel.appendChild(node);
  });
}

function selectSign(idx,nodeEl){
  const s=signs[idx];
  document.querySelectorAll('.sign-node').forEach(n=>n.classList.remove('active'));
  nodeEl.classList.add('active');
  document.getElementById('vs-symbol').textContent=s.symbol;
  document.getElementById('vs-name').textContent=s.name+' — Today\'s Reading';
  document.getElementById('vs-dates').textContent=s.dates;
  document.getElementById('video-header').style.display='flex';
  document.getElementById('detail-row').innerHTML=`
    <div class="detail-card"><div class="detail-label">Element</div><div class="detail-value">${s.element}</div></div>
    <div class="detail-card"><div class="detail-label">Ruler</div><div class="detail-value">${s.ruler}</div></div>
    <div class="detail-card"><div class="detail-label">Nature</div><div class="detail-value">${s.trait}</div></div>
  `;
  document.getElementById('sign-desc').textContent=s.desc;
  document.getElementById('sign-details').style.display='block';
  const frame=document.getElementById('video-frame');
  const vid=ytIds[s.name];
  if(vid){
    frame.innerHTML=`<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  } else {
    frame.innerHTML=`<div class="video-placeholder"><div class="ph-symbol">${s.symbol}</div><p style="font-size:.85rem;text-align:center;line-height:1.7">${s.name}<br><span style="font-size:.75rem;opacity:.6">Today's reading</span></p></div>`;
  }
  document.getElementById('video-section').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function setDate(){
  const d=new Date();
  document.getElementById('date-bar').textContent=
    d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
}

function drawStars(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  ctx.clearRect(0,0,c.width,c.height);
  for(let i=0;i<220;i++){
    const x=Math.random()*c.width,y=Math.random()*c.height;
    const r=Math.random()*1.1,a=Math.random()*.5+.1;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(201,168,76,${a})`;ctx.fill();
  }
}

buildWheel();setDate();drawStars();
window.addEventListener('resize',drawStars);

function scaleWheel(){
  const wheel=document.getElementById('wheel');
  const outer=wheel.parentElement;
  const available=outer.clientWidth;
  const scale=Math.min(1, available/480);
  wheel.style.transform=`scale(${scale})`;
  outer.style.height=(480*scale)+'px';
}
scaleWheel();
window.addEventListener('resize',scaleWheel);

let deg=0;
const sol=document.getElementById('sol-svg');
(function animateSol(){
  deg+=0.025;
  sol.style.transform=`translate(-50%,-50%) rotate(${deg}deg)`;
  requestAnimationFrame(animateSol);
})();
</script>
</body>
</html>
